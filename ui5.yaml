# yaml-language-server: $schema=https://github.io

specVersion: "4.0"
metadata:
  name: gateentry
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: true
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
        backend:
          # 1. Purchase Order Service (OData V4)
          - path: /sap/opu/odata4/sap/api_purchaseorder_2
            url: https://my418935-api.s4hana.cloud.sap
            
          # 2. Outbound Delivery Service (OData V2)
          - path: /sap/opu/odata/sap/API_OUTBOUND_DELIVERY_SRV
            url: https://my418935-api.s4hana.cloud.sap

          # 3. Main ABAP Trial Service
          - authenticationType: reentranceTicket
            path: /sap
            url: https://7a456f9d-5fc0-4e0c-b7a7-81e65d431356.abap.us10.hana.ondemand.com
            destination: abap-cloud-abap_cli-6fb124datrial-dev
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
